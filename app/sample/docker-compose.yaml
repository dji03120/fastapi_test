version: "3.9"

services:
  etri_api_server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: test_fastapi
    ports:
      - "10002:8000"  # 호스트:컨테이너
    volumes:
      - ./:/app

    environment:
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
    restart: unless-stopped
